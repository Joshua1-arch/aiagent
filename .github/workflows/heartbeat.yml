name: Agent Heartbeat Keeper
on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bootstrap OnchainOS
        env:
          SESSION_JSON: ${{ secrets.SESSION_JSON_CONTENT }}
          WALLETS_JSON: ${{ secrets.WALLETS_JSON_CONTENT }}
        run: |
          $onchainosDir = "$env:USERPROFILE\.onchainos"
          if (-not (Test-Path $onchainosDir)) { New-Item -ItemType Directory -Force -Path $onchainosDir }
          Set-Content -Path "$onchainosDir\session.json" -Value $env:SESSION_JSON
          Set-Content -Path "$onchainosDir\wallets.json" -Value $env:WALLETS_JSON
        shell: powershell

      - name: Setup PATH for OnchainOS
        run: |
          echo "$env:GITHUB_WORKSPACE\.bin" >> $env:GITHUB_PATH
        shell: powershell

      - name: Install a2a-node
        run: npm install -g @okxweb3/a2a-node@latest

      - name: Run A2A Daemon
        run: |
          $startTime = Get-Date
          while ((Get-Date) -lt $startTime.AddHours(5).AddMinutes(45)) {
              Write-Host "Sending manual heartbeats for GigAgent and PaySlip..."
              try {
                  cd gigagent; & onchainos.exe agent heartbeat --chain-index 196; cd ..
                  cd payslip; & onchainos.exe agent heartbeat --chain-index 196; cd ..
              } catch {
                  Write-Host "Heartbeat failed: $_"
                  cd $env:GITHUB_WORKSPACE
              }
              
              Write-Host "Starting a2a-node run..."
              # Run a2a-node for 4 minutes then kill it, to allow the loop to repeat
              $job = Start-Job -ScriptBlock { a2a-node run }
              Start-Sleep -Seconds 240
              Stop-Job $job
              Remove-Job $job
              
              Write-Host "Loop completed. Restarting in 10s..."
              Start-Sleep -Seconds 10
          }
        shell: powershell
