name: Agent Heartbeat Keeper
on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap OnchainOS config
        env:
          SESSION_JSON: ${{ secrets.SESSION_JSON_CONTENT }}
          WALLETS_JSON: ${{ secrets.WALLETS_JSON_CONTENT }}
        run: |
          mkdir -p ~/.onchainos
          echo "$SESSION_JSON" > ~/.onchainos/session.json
          echo "$WALLETS_JSON" > ~/.onchainos/wallets.json
        shell: bash

      - name: Install OnchainOS CLI
        shell: bash
        run: |
          LATEST_TAG=$(curl -sSL "https://api.github.com/repos/okx/onchainos-skills/releases/latest" | grep '"tag_name"' | sed 's/.*"tag_name": *"//;s/".*//')
          echo "Latest tag: $LATEST_TAG"
          curl -sSL "https://raw.githubusercontent.com/okx/onchainos-skills/${LATEST_TAG}/install.sh" -o /tmp/onchainos-install.sh
          sh /tmp/onchainos-install.sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify CLI
        run: onchainos --version
        shell: bash

      - name: Send heartbeats (loop ~5h45m)
        shell: bash
        run: |
          START=$(date +%s)
          END=$((START + 5*3600 + 45*60))
          while [ $(date +%s) -lt $END ]; do
              echo "[$(date -Iseconds)] Sending heartbeat for all agents..."
              onchainos agent heartbeat --chain-index 196 || echo "Heartbeat failed (non-fatal)"
              echo "Next heartbeat in 5 minutes..."
              sleep 300
          done
          echo "Loop finished."
