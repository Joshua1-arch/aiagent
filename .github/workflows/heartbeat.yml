name: Agent Heartbeat Keeper
on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bootstrap OnchainOS
        run: |
          mkdir ~/.onchainos
          echo '${{ secrets.SESSION_JSON_CONTENT }}' > ~/.onchainos/session.json
          echo '${{ secrets.WALLETS_JSON_CONTENT }}' > ~/.onchainos/wallets.json
        shell: bash

      - name: Setup PATH for OnchainOS
        run: |
          mkdir -p ~/.local/bin
          cp .bin/onchainos.exe ~/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install a2a-node
        run: npm install -g @okxweb3/a2a-node@latest

      - name: Run A2A Daemon
        run: |
          $startTime = Get-Date
          while ((Get-Date) -lt $startTime.AddHours(5).AddMinutes(45)) {
              Write-Host "Sending manual heartbeats for GigAgent and PaySlip..."
              onchainos agent heartbeat --agent-id 3274 --chain-index 196
              onchainos agent heartbeat --agent-id 3272 --chain-index 196
              
              Write-Host "Starting a2a-node run..."
              # Run a2a-node for 4 minutes then kill it, to allow the loop to repeat
              $job = Start-Job -ScriptBlock { npx @okxweb3/a2a-node run }
              Start-Sleep -Seconds 240
              Stop-Job $job
              Remove-Job $job
              
              Write-Host "Loop completed. Restarting in 10s..."
              Start-Sleep -Seconds 10
          }
        shell: powershell
